name: Release Drafter

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'beta'
        type: choice
        options:
          - beta
          - stable
      branch:
        description: 'Branch to release from (for stable releases)'
        required: true
        default: 'master'
        type: choice
        options:
          - master
          - vNext
      version_override:
        description: 'Version override for stable release (e.g. 4.1.0). Leave empty to auto-resolve.'
        required: false
        type: string
  push:
    branches:
      - master
      - vNext

jobs:
  validate_release:
    if: "!contains(github.event.head_commit.message, 'dependabot/')"
    runs-on: macOS-latest
    steps:
      - name: Checkout files
        uses: actions/checkout@v6

      - name: NodeJS setup
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Installing dependencies
        run: npm ci

      - name: Build release
        run: npm run release

      - name: Test
        run: npm run test:coverage

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  update_beta_release_draft:
    needs: validate_release
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'beta')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout files
        uses: actions/checkout@v6

      - name: NodeJS setup
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Resolve version (dry run)
        id: resolve_version
        uses: release-drafter/release-drafter@v7
        with:
          config-name: ${{ github.ref_name == 'vNext' && 'release-config-beta-vnext.yml' || 'release-config-beta-master.yml' }}
          commitish: ${{ github.ref_name }}
          dry-run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update package.json version
        run: npm version ${{ steps.resolve_version.outputs.resolved_version }} --no-git-tag-version --allow-same-version

      - name: Installing dependencies
        run: npm ci

      - name: Build release
        run: npm run release

      - name: Create beta release draft
        id: create_release
        uses: release-drafter/release-drafter@v7
        with:
          config-name: ${{ github.ref_name == 'vNext' && 'release-config-beta-vnext.yml' || 'release-config-beta-master.yml' }}
          commitish: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        run: |
          find ./dist -type f -exec gh release upload --clobber ${{ env.VERSION }} {} +
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.create_release.outputs.tag_name }}
          FILES: ./dist/*

  update_stable_release_draft:
    needs: validate_release
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_type == 'stable'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout files
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: NodeJS setup
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/

      - name: Resolve version (dry run)
        id: resolve_version
        uses: release-drafter/release-drafter@v7
        with:
          config-name: release-config.yml
          commitish: ${{ github.event.inputs.branch }}
          dry-run: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version
        id: version
        run: |
          OVERRIDE="${{ github.event.inputs.version_override }}"
          RESOLVED="${{ steps.resolve_version.outputs.resolved_version }}"
          if [ -n "$OVERRIDE" ]; then
            echo "value=$OVERRIDE" >> $GITHUB_OUTPUT
          else
            echo "value=$RESOLVED" >> $GITHUB_OUTPUT
          fi

      - name: Update package.json version
        run: npm version ${{ steps.version.outputs.value }} --no-git-tag-version --allow-same-version

      - name: Installing dependencies
        run: npm ci

      - name: Build release
        run: npm run release

      - name: Create stable release draft
        id: create_release
        uses: release-drafter/release-drafter@v7
        with:
          config-name: release-config.yml
          commitish: ${{ github.event.inputs.branch }}
          version: ${{ steps.version.outputs.value }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload release assets
        run: |
          find ./dist -type f -exec gh release upload --clobber ${{ env.VERSION }} {} +
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.create_release.outputs.tag_name }}
          FILES: ./dist/*
